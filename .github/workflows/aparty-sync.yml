name: Aparty Daily Data Sync

on:
  schedule:
    # 🕒 매일 한국시간 오전 6시 (UTC 21:00) - 단지 정보 (새로운 단지만 쏙쏙!)
    - cron: '0 21 * * *'
    # 🕒 매일 한국시간 오전 7시 (UTC 22:00) - 실거래가 (이번 달 최신 거래!)
    - cron: '0 22 * * *'
  workflow_dispatch: # 👈 이게 있으면 깃허브 사이트에서 버튼 눌러서 바로 실행 가능합니다!

jobs:
  sync_data:
    runs-on: ubuntu-latest
    steps:
      - name: Aparty 무인 동기화 로봇 가동 🤖
        run: |
          # 🚨 중요: 아래 "https://대표님의-주소.vercel.app" 부분을 실제 주소로 꼭 수정하세요!
          
          # 1. 단지 정보 동기화 시작
          URL="https://aparty-web-pbyl.vercel.app/api/sync/apt-info?key=aparty-super-secret-2026"
          while [ "$URL" != "null" ] && [ -n "$URL" ]; do
            echo "👉 단지정보 요청: $URL"
            RESPONSE=$(curl -s "$URL")
            URL=$(echo $RESPONSE | jq -r '.nextUrl')
            sleep 2
          done

          # 2. 실거래가 동기화 시작
          URL="https://대표님의-주소.vercel.app/api/sync/real-trades?key=aparty-super-secret-2026"
          while [ "$URL" != "null" ] && [ -n "$URL" ]; do
            echo "👉 실거래가 요청: $URL"
            RESPONSE=$(curl -s "$URL")
            URL=$(echo $RESPONSE | jq -r '.nextUrl')
            sleep 2
          done
          
          echo "🎉 모든 동기화 작업이 성공적으로 끝났습니다!"